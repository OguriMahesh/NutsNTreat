<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="../../assests/img/high-resolution-color-logo-removebg-preview.png">
<link rel="apple-touch-icon" href="../../assests/img/high-resolution-color-logo-removebg-preview.png">
<title>Reset Password – NutsNTreat</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FDF6EC;--brown:#3B1F0A;--amber:#C8832A;--amber-light:#F5D5A0;
  --amber-dark:#8B5A1A;--green:#2D5016;--green-light:#8BC34A;--red:#C0392B;
}
body{font-family:'DM Sans',sans-serif;background:var(--brown);min-height:100vh;display:flex;flex-direction:column}

nav{padding:0 2.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.07)}
.logo{font-family:'Playfair Display',serif;font-size:1.7rem;color:#F5D5A0;text-decoration:none;padding:1rem 0;letter-spacing:-0.5px}
.logo span{color:#8BC34A}

.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden}
.auth-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1574570068730-4de717f6e571?w=1400&q=50') center/cover;opacity:0.06;pointer-events:none}
.auth-bg2{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(200,131,42,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(139,194,74,0.05) 0%,transparent 50%);pointer-events:none}

.auth-card{background:#fff;border-radius:28px;padding:2.8rem 3rem;width:100%;max-width:460px;position:relative;z-index:1;box-shadow:0 24px 80px rgba(0,0,0,0.45)}
.auth-logo{text-align:center;margin-bottom:2rem}
.auth-logo .logo-text{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--brown)}
.auth-logo .logo-text span{color:var(--amber)}
.auth-logo p{font-size:0.8rem;color:rgba(59,31,10,0.45);margin-top:4px;letter-spacing:0.8px;text-transform:uppercase;font-weight:600}

.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-size:0.73rem;font-weight:700;color:rgba(59,31,10,0.55);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:0.45rem}
.input-wrap{position:relative}
.input-wrap input{width:100%;padding:0.82rem 1.1rem;border:1.5px solid var(--amber-light);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.92rem;color:var(--brown);background:#fff;outline:none;transition:all 0.2s}
.input-wrap input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(200,131,42,0.1)}
.input-wrap input:disabled{background:var(--cream);cursor:not-allowed;opacity:0.7}
.input-wrap.has-icon input{padding-left:2.4rem}
.input-wrap.has-icon.has-pw-toggle input{padding-right:2.4rem}
.input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:0.9rem;pointer-events:none}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(59,31,10,0.35);font-size:1rem;padding:4px;transition:color 0.2s}
.pw-toggle:hover{color:var(--brown)}

.pw-strength{margin-top:6px;display:none}
.pw-strength.show{display:block}
.pw-bars{display:flex;gap:4px;margin-bottom:4px}
.pw-bar{height:3px;flex:1;border-radius:3px;background:rgba(59,31,10,0.1);transition:background 0.3s}
.pw-bar.weak{background:var(--red)}
.pw-bar.fair{background:var(--amber)}
.pw-bar.strong{background:var(--green-light)}

.alert{padding:0.75rem 1rem;border-radius:11px;font-size:0.83rem;font-weight:500;margin-bottom:1.1rem;display:none;align-items:flex-start;gap:0.6rem;line-height:1.5}
.alert.show{display:flex;animation:fadeUp 0.2s ease}
.alert-error{background:#fff0f0;border:1.5px solid #ffc5c5;color:#8B1A1A}
.alert-success{background:#f0fff4;border:1.5px solid #b2f5c5;color:var(--green)}
.alert-icon{font-size:1rem;flex-shrink:0;margin-top:1px}

.submit-btn{width:100%;padding:1rem;background:var(--brown);color:#fff;border:none;border-radius:30px;font-weight:700;font-size:0.95rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.22s;margin-top:0.3rem;letter-spacing:0.3px;position:relative;overflow:hidden}
.submit-btn:hover:not(:disabled){background:var(--amber-dark);transform:translateY(-1px);box-shadow:0 8px 20px rgba(59,31,10,0.3)}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.submit-btn .btn-loader{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto}
.submit-btn.loading .btn-text{display:none}
.submit-btn.loading .btn-loader{display:block}

.security-badge{display:flex;align-items:center;justify-content:center;gap:0.4rem;margin-top:1.4rem;padding-top:1.2rem;border-top:1px solid rgba(59,31,10,0.07);font-size:0.73rem;color:rgba(59,31,10,0.35);font-weight:500}

/* Invalid token state */
.invalid-token{text-align:center;padding:1rem 0}
.invalid-token .icon{font-size:3rem;margin-bottom:1rem}
.invalid-token h2{font-family:'Playfair Display',serif;color:var(--brown);margin-bottom:0.5rem}
.invalid-token p{font-size:0.85rem;color:rgba(59,31,10,0.55);line-height:1.6;margin-bottom:1.4rem}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:520px){.auth-card{padding:2rem 1.6rem;border-radius:20px}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Nuts<span>N</span>Treat</a>
</nav>

<div class="auth-wrap">
  <div class="auth-bg"></div>
  <div class="auth-bg2"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-text">Nuts<span>N</span>Treat</div>
      <p>Password Reset</p>
    </div>

    <!-- INVALID / EXPIRED TOKEN VIEW -->
    <div id="invalid-view" class="invalid-token" style="display:none">
      <div class="icon">⛔</div>
      <h2>Link Expired or Invalid</h2>
      <p>This password reset link is invalid or has already expired.<br>Please request a new one.</p>
      <a href="login.html" class="submit-btn" style="display:inline-block;text-decoration:none;text-align:center;padding:0.9rem 2rem;width:auto">Back to Login</a>
    </div>

    <!-- RESET FORM VIEW -->
    <div id="reset-view">
      <div style="text-align:center;margin-bottom:1.6rem">
        <div style="font-size:2rem;margin-bottom:0.4rem">🔐</div>
        <p style="font-size:0.85rem;color:rgba(59,31,10,0.55);line-height:1.5">Choose a strong new password for your account.</p>
      </div>

      <div class="alert alert-error" id="rp-error"><span class="alert-icon">⚠️</span><span id="rp-error-msg"></span></div>
      <div class="alert alert-success" id="rp-success"><span class="alert-icon">✓</span><span id="rp-success-msg"></span></div>

      <div class="form-group">
        <label>New Password <span id="pw-strength-label" style="font-weight:500;text-transform:none;letter-spacing:0;font-size:0.7rem"></span></label>
        <div class="input-wrap has-icon has-pw-toggle">
          <span class="input-icon">🔑</span>
          <input type="password" id="new-password" placeholder="Min 8 characters" autocomplete="new-password" oninput="checkPasswordStrength(this.value)">
          <button class="pw-toggle" onclick="togglePw('new-password')" type="button">👁</button>
        </div>
        <div class="pw-strength" id="pw-strength">
          <div class="pw-bars">
            <div class="pw-bar" id="bar1"></div>
            <div class="pw-bar" id="bar2"></div>
            <div class="pw-bar" id="bar3"></div>
            <div class="pw-bar" id="bar4"></div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm New Password</label>
        <div class="input-wrap has-icon has-pw-toggle">
          <span class="input-icon">🔑</span>
          <input type="password" id="confirm-password" placeholder="Re-enter new password" autocomplete="new-password">
          <button class="pw-toggle" onclick="togglePw('confirm-password')" type="button">👁</button>
        </div>
      </div>

      <button class="submit-btn" id="rp-btn" onclick="doResetPassword()">
        <span class="btn-text">Reset Password →</span>
        <div class="btn-loader"></div>
      </button>

      <div style="text-align:center;margin-top:1rem">
        <a href="login.html" style="font-size:0.83rem;color:rgba(59,31,10,0.45);text-decoration:none;">← Back to Sign In</a>
      </div>
    </div>

    <div class="security-badge">
      <span>🔒</span> 256-bit encrypted · Secure reset
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';

async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function showAlert(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  const m = el.querySelector('span:last-child');
  if (m) m.textContent = msg;
  el.classList.add('show');
}
function hideAlert(id) { document.getElementById(id)?.classList.remove('show'); }
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = loading;
  btn.classList.toggle('loading', loading);
}
function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
function checkPasswordStrength(pw) {
  const wrap = document.getElementById('pw-strength'), label = document.getElementById('pw-strength-label');
  if (!pw) { wrap.classList.remove('show'); label.textContent = ''; return; }
  wrap.classList.add('show');
  let score = 0;
  if (pw.length >= 8) score++; if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/\d/.test(pw)) score++; if (/[!@#$%^&*(),.?":{}|<>]/.test(pw)) score++;
  const lvl = score <= 1 ? 'weak' : score <= 3 ? 'fair' : 'strong';
  const labels = { weak: '🔴 Weak', fair: '🟡 Fair', strong: '🟢 Strong' };
  for (let i = 1; i <= 4; i++) {
    const b = document.getElementById('bar' + i);
    b.className = 'pw-bar';
    if (i <= Math.min(score, 4)) b.classList.add(lvl);
  }
  label.textContent = labels[lvl];
  label.style.color = lvl === 'weak' ? 'var(--red)' : lvl === 'fair' ? 'var(--amber-dark)' : 'var(--green)';
}

// ── Read token from URL ──
const _token = new URLSearchParams(window.location.search).get('token');

// If no token present, show invalid view immediately
if (!_token) {
  document.getElementById('reset-view').style.display = 'none';
  document.getElementById('invalid-view').style.display = 'block';
}

// ── Reset password ──
async function doResetPassword() {
  hideAlert('rp-error');
  hideAlert('rp-success');

  const newPw  = document.getElementById('new-password').value;
  const confPw = document.getElementById('confirm-password').value;

  if (!newPw || !confPw) { showAlert('rp-error', 'Please fill in both password fields.'); return; }
  if (newPw.length < 8)  { showAlert('rp-error', 'Password must be at least 8 characters.'); return; }
  if (newPw !== confPw)  { showAlert('rp-error', 'Passwords do not match.'); return; }

  setLoading('rp-btn', true);
  try {
    await api('/auth/reset-password', 'POST', { token: _token, newPassword: newPw });
    showAlert('rp-success', '✅ Password reset successfully! Redirecting to login...');
    document.getElementById('new-password').disabled  = true;
    document.getElementById('confirm-password').disabled = true;
    document.getElementById('rp-btn').disabled = true;
    setTimeout(() => { window.location.replace('login.html'); }, 2000);
  } catch (err) {
    // Token expired or invalid from server
    if (err.message?.toLowerCase().includes('token') || err.message?.toLowerCase().includes('expired') || err.message?.toLowerCase().includes('invalid')) {
      document.getElementById('reset-view').style.display = 'none';
      document.getElementById('invalid-view').style.display = 'block';
    } else {
      showAlert('rp-error', err.message || 'Something went wrong. Please try again.');
    }
  } finally {
    setLoading('rp-btn', false);
  }
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && _token) doResetPassword();
});
</script>
</body>
</html>
